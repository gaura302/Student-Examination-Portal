<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Show All Users</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'css/student.css' %}">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            min-height:100vh;
            background:linear-gradient(to right,#141e30,#243b55);
            padding:30px;
        }

        .container{
            width:95%;
            max-width:1100px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:18px;
            box-shadow:0 0 20px rgba(0,0,0,0.3);
        }

        .title{
            text-align:center;
            font-size:35px;
            font-weight:bold;
            color:#243b55;
            margin-bottom:25px;
        }

        .menu{
            text-align:center;
            margin-bottom:30px;
        }

        .menu a{
            display:inline-block;
            margin:6px;
            padding:10px 18px;
            text-decoration:none;
            background:#243b55;
            color:white;
            border-radius:8px;
            transition:0.3s;
            font-size:15px;
        }

        .menu a:hover{
            background:#141e30;
            transform:scale(1.05);
        }

        table{
            width:100%;
            border-collapse:collapse;
            overflow:hidden;
            border-radius:12px;
        }

        th{
            background:#243b55;
            color:white;
            padding:16px;
            font-size:18px;
        }

        td{
            padding:15px;
            text-align:center;
            border-bottom:1px solid #ddd;
            font-size:16px;
        }

        tr:nth-child(even){
            background:#f4f4f4;
        }

        tr:hover{
            background:#dfe6e9;
            transition:0.3s;
        }

        .delete-btn{
            text-decoration:none;
            background:#d63031;
            color:white;
            padding:8px 14px;
            border-radius:8px;
            transition:0.3s;
            font-weight:bold;
        }

        .delete-btn:hover{
            background:#b71c1c;
        }
    </style>

</head>

<body>

    <div class="container">

        <div class="title">All Registered Users</div>

        <div class="menu">
            <a href="/testcraftApp/givemeragister/">Add User</a>
            <a href="">Show User</a>
            <a href="">Update User</a>
            <a href="">Delete User</a>
            <a href="/testcraftApp/showalluser/">Show All User</a>
            <a href="/testcraftApp/">Home Page</a>
        </div>

        <table>

            <tr>
                <th>Username</th>
                <th>Password</th>
                <th>Mobile Number</th>
                <th>Delete User</th>
            </tr>

            {% for ud in udata %}
            <tr>

                <td>{{ud.username}}</td>

                <td>{{ud.password}}</td>

                <td>{{ud.mobno}}</td>

                <td>
                    <a href="/testcraftApp/deleteusershowall/?username={{ud.username}}"
                       class="delete-btn">
                       Delete
                    </a>
                </td>

            </tr>
            {% endfor %}

        </table>

    </div>

</body>

</html>
