<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'css/student.css' %}">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            min-height:100vh;
            background:linear-gradient(to right,#141e30,#243b55);
            display:flex;
            justify-content:center;
            align-items:center;
            padding:30px;
        }

        .container{
            width:500px;
            background:white;
            padding:35px;
            border-radius:18px;
            box-shadow:0 0 20px rgba(0,0,0,0.3);
        }

        .title{
            text-align:center;
            font-size:32px;
            color:#243b55;
            margin-bottom:25px;
            font-weight:bold;
        }

        .menu{
            text-align:center;
            margin-bottom:25px;
        }

        .menu a{
            display:inline-block;
            margin:5px;
            padding:10px 18px;
            background:#243b55;
            color:white;
            text-decoration:none;
            border-radius:8px;
            transition:0.3s;
            font-size:14px;
        }

        .menu a:hover{
            background:#141e30;
            transform:scale(1.05);
        }

        hr{
            margin-bottom:25px;
            border:1px solid #ddd;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
            color:#333;
        }

        input[type="text"],
        input[type="tel"]{
            width:100%;
            padding:12px;
            margin-bottom:20px;
            border:1px solid #ccc;
            border-radius:10px;
            font-size:16px;
            outline:none;
            transition:0.3s;
        }

        input[type="text"]:focus,
        input[type="tel"]:focus{
            border:2px solid #243b55;
        }

        .btn-group{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:12px;
            margin-top:15px;
        }

        .btn{
            padding:12px;
            border:none;
            border-radius:10px;
            color:white;
            font-size:15px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        .add{
            background:#00b894;
        }

        .show{
            background:#0984e3;
        }

        .update{
            background:#fdcb6e;
            color:black;
        }

        .delete{
            background:#d63031;
        }

        .all{
            background:#6c5ce7;
        }

        .btn:hover{
            transform:scale(1.05);
            opacity:0.9;
        }

        .message{
            display:block;
            text-align:center;
            margin-top:20px;
            color:red;
            font-size:18px;
            font-weight:bold;
        }
    </style>

</head>

<body>

    <div class="container">

        <div class="title">User Management</div>

        <div class="menu">
            <a href="/testcraftApp/givemeragister/">Add User</a>
            <a href="">Show User</a>
            <a href="">Update User</a>
            <a href="">Delete User</a>
            <a href="/testcraftApp/showalluser/">Show All User</a>
            <a href="/testcraftApp/">Home Page</a>
        </div>

        <hr>

        <form>

            <label>Username</label>
            <input type="text"
                   name="username"
                   placeholder="Enter your username"
                   value="{{udata.username}}">

            <label>Password</label>
            <input type="text"
                   name="password"
                   placeholder="Enter your password"
                   value="{{udata.password}}">

            <label>Mobile Number</label>
            <input type="tel"
                   name="mobno"
                   placeholder="Enter your mobile number"
                   value="{{udata.mobno}}">

            <div class="btn-group">

                <input type="submit"
                       value="Add User"
                       formaction="/testcraftApp/adduser/"
                       class="btn add">

                <input type="submit"
                       value="Show User"
                       formaction="/testcraftApp/showuser/"
                       class="btn show">

                <input type="submit"
                       value="Update User"
                       formaction="/testcraftApp/updateuser/"
                       class="btn update">

                <input type="submit"
                       value="Delete User"
                       formaction="/testcraftApp/deleteuser/"
                       class="btn delete">

                <input type="submit"
                       value="ShowAll User"
                       formaction="/testcraftApp/showalluser/"
                       class="btn all">

            </div>

        </form>

        <span class="message">{{message}}</span>

    </div>

</body>

</html>
