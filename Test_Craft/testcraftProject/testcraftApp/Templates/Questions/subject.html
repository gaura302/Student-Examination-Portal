<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Test</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'css/questions.css' %}">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(to right,#141e30,#243b55);
        }

        .test-box{
            width:420px;
            background:white;
            padding:40px;
            border-radius:18px;
            box-shadow:0 0 20px rgba(0,0,0,0.3);
            text-align:center;
        }

        .welcome{
            font-size:22px;
            font-weight:bold;
            color:#243b55;
            margin-bottom:10px;
        }

        hr{
            margin:20px 0;
            border:1px solid #ddd;
        }

        .title{
            font-size:28px;
            color:#141e30;
            margin-bottom:25px;
        }

        label{
            font-size:18px;
            font-weight:bold;
            color:#333;
        }

        select{
            width:100%;
            padding:12px;
            margin-top:15px;
            border:1px solid #ccc;
            border-radius:10px;
            font-size:16px;
            outline:none;
            transition:0.3s;
        }

        select:focus{
            border:2px solid #243b55;
        }

        .btn{
            margin-top:30px;
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            background:#00b894;
            color:white;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        .btn:hover{
            background:#019875;
            transform:scale(1.03);
        }
    </style>

</head>

<body>

    <div class="test-box">

        <div class="welcome">
            Welcome {{request.session.username}}
        </div>

        <hr>

        <h1 class="title">Start Your Test</h1>

        <form>

            <label>Select Subject</label>

            <select name="subject">

                <option>Select a subject</option>

                {% for sub in subjects %}
                <option value="{{ sub }}">{{ sub }}</option>
                {% endfor %}

            </select>

            <input type="submit"
                   value="Start Test"
                   formaction="/testcraftApp/starttest/"
                   class="btn">

        </form>

    </div>

</body>

</html>
